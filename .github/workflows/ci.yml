name: CI

on:
  push:
    branches: [master, "sprint/**"]
  pull_request:
    branches: [master]

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run

  rust-test:
    name: Rust lib tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Create placeholder sidecar binary for cargo build
        run: |
          touch src-python/main-x86_64-unknown-linux-gnu
          chmod +x src-python/main-x86_64-unknown-linux-gnu

      - name: cargo test --lib
        run: cargo test --lib --manifest-path src-tauri/Cargo.toml
